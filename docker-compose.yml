# Omni Ecomm Engine — production compose
# Self-contained Redis. Supabase reached via public sslip.io URL.
name: omni-ecomm-engine

x-env: &shared_env
  NODE_ENV: production
  REDIS_URL: redis://redis:6379
  SUPABASE_URL: ${SUPABASE_URL}
  SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
  DATABASE_URL: ${DATABASE_URL}

services:
  redis:
    image: redis:7-alpine
    container_name: omni-ecomm-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./data/redis:/data

  engine-web:
    build: { context: ., dockerfile: apps/engine/Dockerfile }
    container_name: omni-ecomm-web
    restart: unless-stopped
    depends_on: [redis]
    environment:
      <<: *shared_env
      PORT: 8005
      APP_URL: ${APP_URL:-https://engine.5-78-187-35.sslip.io}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "127.0.0.1:8005:8005"

  scrape-worker:
    build: { context: ., dockerfile: services/scrape-worker/Dockerfile }
    container_name: omni-ecomm-scrape
    restart: unless-stopped
    depends_on: [redis]
    environment:
      <<: *shared_env
      SCRAPE_CONCURRENCY: 4

  process-worker:
    build: { context: ., dockerfile: services/process-worker/Dockerfile }
    container_name: omni-ecomm-process
    restart: unless-stopped
    depends_on: [redis]
    environment:
      <<: *shared_env
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_DEFAULT_MODEL: ${CLAUDE_DEFAULT_MODEL:-claude-sonnet-4-6}
      CLAUDE_COMPLEX_MODEL: ${CLAUDE_COMPLEX_MODEL:-claude-opus-4-7}
      PROCESS_CONCURRENCY: 6

  generate-worker:
    build: { context: ., dockerfile: services/generate-worker/Dockerfile }
    container_name: omni-ecomm-generate
    restart: unless-stopped
    depends_on: [redis]
    environment:
      <<: *shared_env
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_IMAGE_MODEL: ${GEMINI_IMAGE_MODEL:-gemini-2.5-flash-image}
      GENERATE_CONCURRENCY: 2

  audit-worker:
    build: { context: ., dockerfile: services/audit-worker/Dockerfile }
    container_name: omni-ecomm-audit
    restart: unless-stopped
    depends_on: [redis]
    environment:
      <<: *shared_env
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      AUDIT_VISION_MODEL: ${AUDIT_VISION_MODEL:-claude-opus-4-7}
      AUDIT_CONCURRENCY: 4

  notify-worker:
    build: { context: ., dockerfile: services/notify-worker/Dockerfile }
    container_name: omni-ecomm-notify
    restart: unless-stopped
    depends_on: [redis]
    environment:
      <<: *shared_env
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-engine@omnichannelsol.com}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_DEFAULT_CHANNEL: ${SLACK_DEFAULT_CHANNEL:-#omni-ecomm}
      NOTIFY_CONCURRENCY: 10

  export-worker:
    build: { context: ., dockerfile: services/export-worker/Dockerfile }
    container_name: omni-ecomm-export
    restart: unless-stopped
    depends_on: [redis]
    environment:
      <<: *shared_env
      EXPORT_DIR: /data/exports
      EXPORT_CONCURRENCY: 2
    volumes:
      - ./data/exports:/data/exports
